services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nauticfinder-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: nauticfinder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nauticfinder-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    container_name: nauticfinder-scraper
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      BROWSER_PORT: 3001
    # Chromium needs more shared memory than Docker's default 64MB
    shm_size: '1gb'

volumes:
  postgres_data:
  redis_data:
